name = "eatornot-api"
main = "src/index.ts"
compatibility_date = "2026-06-05"

# Observability — 与 Cloudflare Dashboard 保持一致
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Cron triggers for meal reminders (UTC → CST+8)
# 0:03 UTC = 08:03 CST (breakfast)
# 4:07 UTC = 12:07 CST (lunch)
# 10:03 UTC = 18:03 CST (dinner)
[triggers]
crons = ["3 0 * * *", "7 4 * * *", "3 10 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "eatornot-db"
database_id = "d01b9859-dd10-4e6c-bcdf-7bcf2fb33606"
